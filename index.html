<!doctype html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logoPtitca.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="FirePhoenix — кавер-группа, в которой рождается музыка. Релизы, состав, услуги адаптации и набор музыкантов." />
    <title>FirePhoenix — кавер-группа</title>
    <script>
      // Применяем сохранённую тему до отрисовки React, чтобы избежать FOUC
      (function () {
        try {
          var raw = localStorage.getItem('fp_theme');
          if (raw) {
            var data = JSON.parse(raw);
            var t = data && data.state && data.state.theme;
            if (t === 'light' || t === 'dark') {
              document.documentElement.setAttribute('data-theme', t);
            }
          }
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lobster&family=Comfortaa:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Если открыт 404.html — подменить URL, чтобы SPA-роутер работал корректно
      (function () {
        var p = window.location.pathname;
        if (/^\/(404|404\.html)$/i.test(p)) {
          var target = sessionStorage.getItem('fp_intended_path') || '/';
          sessionStorage.removeItem('fp_intended_path');
          window.history.replaceState({}, '', target);
        } else {
          sessionStorage.setItem('fp_intended_path', p);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
